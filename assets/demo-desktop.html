<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>skill-forge — Claude Code desktop demo</title>
<style>
  :root{
    --bg:#ffffff; --side:#f4f1ec; --line:#e7e1d7; --ink:#2c2724; --mut:#8c8478;
    --coral:#cc785c; --green:#5f9e57; --greenbg:#eaf3e6; --red:#c2553f; --redbg:#f6e7e2;
    --chip:#efe9df; --userbg:#f7f4ef;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#cfc8bd}
  body{display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,"SF Pro Text",Inter,Segoe UI,sans-serif}
  .app{width:1000px;height:640px;background:var(--bg);border-radius:14px;overflow:hidden;
    display:flex;box-shadow:0 30px 80px rgba(0,0,0,.4);border:1px solid #d9d2c7}
  /* sidebar */
  .side{width:236px;background:var(--side);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:12px 10px;color:var(--ink);font-size:13.5px}
  .dots{display:flex;gap:7px;padding:4px 6px 14px}
  .dot{width:11px;height:11px;border-radius:50%}.r{background:#e0655a}.y{background:#e2b54e}.g{background:#67c06a}
  .seg{display:flex;background:#e9e3d8;border-radius:9px;padding:3px;margin:2px 4px 12px;gap:2px}
  .seg div{flex:1;text-align:center;padding:5px 0;border-radius:7px;color:var(--mut);font-weight:600;font-size:12.5px}
  .seg .on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .nav{padding:0 6px}.nav .it{padding:6px 8px;border-radius:7px;color:#5c554c;display:flex;gap:8px;align-items:center}
  .lbl{color:var(--mut);font-size:11px;font-weight:700;letter-spacing:.6px;margin:14px 8px 6px;text-transform:uppercase}
  .rec{padding:6px 8px;border-radius:7px;color:#5c554c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec.on{background:#e7e0d3;color:var(--ink);font-weight:600}
  .rec .pf{color:var(--coral);margin-right:7px}
  .acct{margin-top:auto;padding:8px;color:var(--mut);display:flex;align-items:center;gap:8px;border-top:1px solid var(--line)}
  .av{width:22px;height:22px;border-radius:50%;background:var(--coral);color:#fff;font-size:11px;
    display:flex;align-items:center;justify-content:center;font-weight:700}
  /* main */
  .main{flex:1;display:flex;flex-direction:column}
  .top{height:46px;border-bottom:1px solid var(--line);display:flex;align-items:center;
    padding:0 18px;color:var(--mut);font-size:13px;gap:6px}
  .top b{color:var(--ink);font-weight:600}
  .chat{flex:1;overflow:hidden;padding:18px 26px}
  .node{margin-bottom:13px}
  .nudge{background:#fbf3ec;border:1px solid #f0dcc9;border-left:3px solid var(--coral);
    border-radius:8px;padding:10px 13px;color:#6b4a35;font-size:14px}
  .nudge code{background:#f1e3d6;padding:1px 6px;border-radius:5px;color:var(--coral);font-weight:600;
    font-family:"SF Mono",Menlo,monospace}
  .user{display:flex;justify-content:flex-end}
  .user .b{background:var(--userbg);border:1px solid var(--line);border-radius:12px;padding:8px 13px;
    font-size:14.5px;color:var(--ink);font-family:"SF Mono",Menlo,monospace}
  .turn{display:flex;gap:11px}
  .turn .ava{width:25px;height:25px;border-radius:6px;background:var(--coral);color:#fff;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
  .turn .body{font-size:14.5px;color:var(--ink);line-height:1.6}
  .turn .body .row{margin:3px 0}
  .mut{color:var(--mut)}.b{font-weight:600}.mono{font-family:"SF Mono",Menlo,monospace}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--chip);border-radius:7px;
    padding:3px 9px;font-size:12.5px;color:#6b6358;font-family:"SF Mono",Menlo,monospace}
  .chip .ok{color:var(--green)}
  .tag{display:inline-block;padding:1px 8px;border-radius:6px;font-size:12px;font-weight:700;margin-right:7px}
  .tag.low{background:var(--greenbg);color:var(--green)}.tag.high{background:var(--redbg);color:var(--red)}
  .green{color:var(--green)}.red{color:var(--red)}
  /* composer */
  .comp{padding:12px 22px 16px}
  .box{border:1px solid #ddd5c8;border-radius:12px;padding:12px 14px;color:var(--mut);font-size:14.5px;
    min-height:46px;display:flex;align-items:center;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .box .typed{color:var(--ink);font-family:"SF Mono",Menlo,monospace}
  .cur{display:inline-block;width:8px;height:17px;background:var(--ink);vertical-align:-3px;margin-left:1px}
  .foot{display:flex;justify-content:space-between;margin-top:8px;color:var(--mut);font-size:12px}
  .pill{background:#f0ece3;border-radius:6px;padding:2px 8px}
</style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
      <div class="seg"><div>Chat</div><div>Cowork</div><div class="on">Code</div></div>
      <div class="nav">
        <div class="it">✦ &nbsp;New session</div>
        <div class="it">⚡ &nbsp;Routines</div>
        <div class="it">⚙ &nbsp;Customize</div>
      </div>
      <div class="lbl">Recents</div>
      <div class="rec on"><span class="pf">●</span>skill-forge</div>
      <div class="rec"><span class="pf">○</span>smm-agent monitoring</div>
      <div class="rec"><span class="pf">○</span>WB stock sync</div>
      <div class="rec"><span class="pf">○</span>Four skills setup</div>
      <div class="acct"><span class="av">R</span><span>Roman · Max</span></div>
    </aside>
    <main class="main">
      <div class="top">📁 skill-forge&nbsp; / &nbsp;<b>forge</b></div>
      <div class="chat" id="chat"></div>
      <div class="comp">
        <div class="box" id="box"><span class="mut" id="ph">Type / for commands</span></div>
        <div class="foot"><span>Bypass permissions</span><span class="pill">Opus 4.8 (1M context) · Max · Fast</span></div>
      </div>
    </main>
  </div>
<script>
const CMD='/skill-forge:forge';
const TYPE_START=900, TYPE_PER=60, SEND=2050;
const NODES=[
  {t:0, h:'<div class="nudge">📌 <b>skill-forge</b> — 1 past session queued for distillation into skills. Run <code>/skill-forge:forge</code> when you have a moment.</div>'},
  {t:SEND, h:'<div class="user"><div class="b">/skill-forge:forge</div></div>'},
  {t:2350, turn:true},
];
const ROWS=[ // appended inside the assistant turn body
  {t:2500, h:'<div class="row">Reflecting on the queued session (146 tool calls) and this one…</div>'},
  {t:3200, h:'<div class="row"><span class="chip">Read transcript <span class="ok">✓</span></span></div>'},
  {t:3900, h:'<div class="row mut">• repeated pattern — <span class="mono" style="color:var(--ink)">stock-sync via external API</span></div>'},
  {t:4600, h:'<div class="row mut">• recurring fix — return <span class="b" style="color:var(--ink)">None</span>, not <span class="b" style="color:var(--ink)">0.0</span>, on a missing metric</div>'},
  {t:5500, h:'<div class="row"><span class="b">Proposals</span> <span class="mut">(gated):</span></div>'},
  {t:6100, h:'<div class="row"><span class="tag low">low-risk</span>add “Got X” to <span class="b">verifier-add</span> <span class="green">→ applied</span></div>'},
  {t:6700, h:'<div class="row"><span class="chip">Edited verifier-add/SKILL.md <span class="ok">+1</span></span></div>'},
  {t:7500, h:'<div class="row"><span class="tag high">high-risk</span>new skill <span class="b">stock-sync</span> <span class="red">→ awaiting your approval</span></div>'},
  {t:8700, h:'<div class="row"><span class="b green">✓ Skills updated.</span> <span class="mut">Day 30 &gt; Day 1.</span></div>'},
];
const chat=document.getElementById('chat'), box=document.getElementById('box');
function fade(ms,t){ const o=Math.max(0,Math.min(1,(ms-t)/240)); return o; }
function seek(ms){
  let html='';
  for(const n of NODES){
    if(ms<n.t) continue;
    const o=fade(ms,n.t), y=(1-o)*5;
    if(n.turn){
      let rows='';
      for(const r of ROWS){ if(ms>=r.t){ const ro=fade(ms,r.t); rows+='<div style="opacity:'+ro+';transform:translateY('+((1-ro)*4)+'px)">'+r.h+'</div>'; } }
      html+='<div class="node" style="opacity:'+o+';transform:translateY('+y+'px)"><div class="turn"><div class="ava">✻</div><div class="body">'+rows+'</div></div></div>';
    } else {
      html+='<div class="node" style="opacity:'+o+';transform:translateY('+y+'px)">'+n.h+'</div>';
    }
  }
  chat.innerHTML=html;
  // composer
  if(ms>=TYPE_START && ms<SEND){
    const k=Math.max(0,Math.min(CMD.length,Math.floor((ms-TYPE_START)/TYPE_PER)));
    const blink=(Math.floor(ms/450)%2)?'<span class="cur"></span>':'';
    box.innerHTML='<span class="typed">'+CMD.slice(0,k)+'</span>'+blink;
  } else {
    box.innerHTML='<span class="mut">Type / for commands</span>';
  }
}
window.seek=seek; window.DURATION=11500; seek(0);
</script>
</body>
</html>
